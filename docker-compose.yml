---
services:

  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/php_db.sql:/docker-entrypoint-initdb.d/dump.sql
    networks:
      - backend

  api:
    build: ./api
    container_name: api
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      - db
    networks:
      - backend
      - frontend
    volumes:
      - ./front/public/uploads:/var/www/public/uploads

  front:
    build: ./front
    container_name: front
    restart: always
    ports:
      - "${WEB_PORT}:80"
    environment:
      API_URL: http://api:80
    depends_on:
      - api
    networks:
      - frontend
    volumes:
      - ./front/public/uploads:/var/www/public/uploads

volumes:
  db_data:

networks:
  backend:
  frontend:
